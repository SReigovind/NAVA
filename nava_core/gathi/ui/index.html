<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NAVA Local Test UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1e9;
        --ink: #1c1c1c;
        --muted: #585858;
        --teal: #0f766e;
        --amber: #f59e0b;
        --card: #ffffff;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 15% 20%, rgba(245, 158, 11, 0.2), transparent 45%),
          radial-gradient(circle at 80% 0%, rgba(15, 118, 110, 0.2), transparent 40%),
          var(--bg);
        min-height: 100vh;
      }

      .page {
        padding: 36px 20px 80px;
        max-width: 1100px;
        margin: 0 auto;
        animation: fadeIn 0.6s ease;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 24px;
      }

      .title {
        font-family: "Fraunces", serif;
        font-size: clamp(28px, 3vw, 38px);
        letter-spacing: 0.5px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 15px;
      }

      .tabs {
        display: flex;
        gap: 12px;
        margin: 24px 0;
      }

      .tab {
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        font-weight: 600;
        color: var(--muted);
      }

      .tab.active {
        background: var(--ink);
        color: white;
        border-color: transparent;
      }

      .card {
        background: var(--card);
        border-radius: 24px;
        padding: 24px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(0, 0, 0, 0.06);
      }

      .grid {
        display: grid;
        gap: 20px;
      }

      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input[type="text"],
      select,
      input[type="file"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        font-size: 14px;
        background: white;
      }

      button {
        padding: 12px 18px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        background: var(--teal);
        color: white;
      }

      button.alt {
        background: var(--amber);
        color: #1b1205;
      }

      .button-row {
        display: flex;
        gap: 12px;
      }

      .button-row button {
        flex: 1;
      }

      .results {
        display: grid;
        gap: 12px;
        padding: 16px;
        background: rgba(15, 118, 110, 0.08);
        border-radius: 16px;
      }

      .results span {
        font-weight: 600;
      }

      .image-row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      img {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: #fafafa;
        display: block;
      }

      img.empty-frame {
        height: 140px;
        object-fit: contain;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="title">NAVA Local Test UI</div>
        <div class="subtitle">Quick sanity checks for Mizhi (disease) and VNIR monitoring.</div>
      </header>

      <div class="tabs">
        <button class="tab active" data-tab="diagnose">Diagnose</button>
        <button class="tab" data-tab="vnir">VNIR Monitor</button>
      </div>

      <section id="diagnose" class="card grid">
        <div class="grid two">
          <div>
            <label>Upload leaf image</label>
            <input id="diagnoseFile" type="file" accept="image/*" />
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="diagnoseBtn">Run Diagnose</button>
          </div>
        </div>
        <div class="results" id="diagnoseResults">
          <div><span>Class:</span> <span id="diagClass">-</span></div>
          <div><span>Confidence:</span> <span id="diagConf">-</span></div>
          <div><span>Reliability:</span> <span id="diagReliability">-</span></div>
        </div>
        <div class="image-row" id="diagImages">
          <div>
            <div class="muted">Original Image</div>
            <img
              id="diagSource"
              class="empty-frame"
              alt=""
              src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
            />
          </div>
          <div>
            <div class="muted">Grad-CAM Overlay</div>
            <img
              id="diagCam"
              class="empty-frame"
              alt=""
              src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
            />
          </div>
        </div>
      </section>

      <section id="vnir" class="card grid hidden">
        <div class="grid two">
          <div>
            <label>Plant ID</label>
            <input id="vnirPlant" type="text" placeholder="plant_01" />
          </div>
          <div>
            <label>Upload leaf image</label>
            <input id="vnirFile" type="file" accept="image/*" />
          </div>
        </div>
        <div class="grid two">
          <div>
            <label>Existing Plant IDs</label>
            <select id="vnirPlantList"></select>
          </div>
          <div>
            <label>&nbsp;</label>
            <div class="button-row">
              <button id="vnirUseBtn">Use Selected</button>
              <button id="vnirClearBtn">Clear History</button>
            </div>
          </div>
        </div>
        <div>
          <button class="alt" id="vnirBtn">Run VNIR</button>
        </div>
        <div class="results" id="vnirResults">
          <div><span>Status:</span> <span id="vnirStatus">-</span></div>
          <div><span>Leaf State:</span> <span id="vnirLeaf">-</span></div>
          <div><span>Ratio:</span> <span id="vnirRatio">-</span></div>
          <div><span>Vs Baseline:</span> <span id="vnirVsBaseline">-</span></div>
          <div><span>Vs Global:</span> <span id="vnirVsGlobal">-</span></div>
          <div><span>Vs Rolling:</span> <span id="vnirVsRolling">-</span></div>
          <div><span>Vs Prev Checkpoint:</span> <span id="vnirVsPrev">-</span></div>
        </div>
        <div class="image-row">
          <div>
            <div class="muted">HSV Isolate</div>
            <img
              id="vnirHsv"
              class="empty-frame"
              alt=""
              src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
            />
          </div>
          <div>
            <div class="muted">VNIR Output</div>
            <img
              id="vnirOut"
              class="empty-frame"
              alt=""
              src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
            />
          </div>
        </div>
      </section>
    </div>

    <script>
      const tabs = document.querySelectorAll(".tab");
      const sections = {
        diagnose: document.getElementById("diagnose"),
        vnir: document.getElementById("vnir"),
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          Object.values(sections).forEach((section) => section.classList.add("hidden"));
          sections[tab.dataset.tab].classList.remove("hidden");
          if (tab.dataset.tab === "diagnose") {
            document.getElementById("diagImages").classList.remove("hidden");
          }
        });
      });

      document.getElementById("diagnoseBtn").addEventListener("click", async () => {
        const fileInput = document.getElementById("diagnoseFile");
        if (!fileInput.files.length) {
          alert("Select an image first.");
          return;
        }

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        const response = await fetch("/api/diagnose", {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          alert("Diagnose failed.");
          return;
        }

        const data = await response.json();
        document.getElementById("diagClass").textContent = data.class_label;
        document.getElementById("diagConf").textContent = data.confidence.toFixed(4);
        document.getElementById("diagReliability").textContent = data.reliability;
        const imageRow = document.getElementById("diagImages");
        const sourceImg = document.getElementById("diagSource");
        const camImg = document.getElementById("diagCam");

        if (data.reliability === "UNRELIABLE") {
          imageRow.classList.add("hidden");
          sourceImg.src = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
          camImg.src = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
          sourceImg.classList.add("empty-frame");
          camImg.classList.add("empty-frame");
          return;
        }

        imageRow.classList.remove("hidden");
        if (data.original_image_base64) {
          sourceImg.src = data.original_image_base64;
          sourceImg.classList.remove("empty-frame");
        }
        if (data.gradcam_image_base64) {
          camImg.src = data.gradcam_image_base64;
          camImg.classList.remove("empty-frame");
        }
      });

      async function refreshPlantList() {
        const response = await fetch("/api/vnir-plants");
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        const select = document.getElementById("vnirPlantList");
        select.innerHTML = "";
        if (!data.plant_ids.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "No history yet";
          select.appendChild(option);
          return;
        }
        data.plant_ids.forEach((plantId) => {
          const option = document.createElement("option");
          option.value = plantId;
          option.textContent = plantId;
          select.appendChild(option);
        });
      }

      document.getElementById("vnirUseBtn").addEventListener("click", () => {
        const select = document.getElementById("vnirPlantList");
        if (select.value) {
          document.getElementById("vnirPlant").value = select.value;
        }
      });

      document.getElementById("vnirBtn").addEventListener("click", async () => {
        const fileInput = document.getElementById("vnirFile");
        const plantId = document.getElementById("vnirPlant").value.trim() || "plant_default";
        if (!fileInput.files.length) {
          alert("Select an image first.");
          return;
        }

        const formData = new FormData();
        formData.append("plant_id", plantId);
        formData.append("image", fileInput.files[0]);

        const response = await fetch("/api/vnir-upload", {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          alert("VNIR failed.");
          return;
        }

        const data = await response.json();
        document.getElementById("vnirStatus").textContent = data.status;
        document.getElementById("vnirLeaf").textContent = data.leaf_state;
        document.getElementById("vnirRatio").textContent = data.ratio.toFixed(4);
        const formatPercent = (value) => {
          if (value === null || value === undefined) {
            return "n/a";
          }
          const num = Number(value);
          if (Number.isNaN(num)) {
            return "n/a";
          }
          const tryFormat = (decimals) => {
            const formatted = num.toFixed(decimals);
            return formatted.length <= 6 ? formatted : null;
          };
          let compact = tryFormat(2) || tryFormat(1) || tryFormat(0) || num.toFixed(0);
          return `${compact}%`;
        };

        document.getElementById("vnirVsBaseline").textContent = formatPercent(data.vs_baseline);
        document.getElementById("vnirVsGlobal").textContent = formatPercent(data.vs_global);
        document.getElementById("vnirVsRolling").textContent = formatPercent(data.vs_rolling);
        document.getElementById("vnirVsPrev").textContent = formatPercent(data.vs_prev_checkpoint);
        const hsvImg = document.getElementById("vnirHsv");
        const vnirImg = document.getElementById("vnirOut");
        hsvImg.src = data.hsv_image_base64;
        vnirImg.src = data.vnir_image_base64;
        hsvImg.classList.remove("empty-frame");
        vnirImg.classList.remove("empty-frame");
        refreshPlantList();
      });

      document.getElementById("vnirClearBtn").addEventListener("click", async () => {
        const select = document.getElementById("vnirPlantList");
        const selected = select.value.trim();
        const typed = document.getElementById("vnirPlant").value.trim();
        const plantId = selected || typed;
        if (!plantId) {
          alert("Select or enter a plant ID to clear.");
          return;
        }
        const formData = new FormData();
        formData.append("plant_id", plantId);
        const response = await fetch("/api/vnir-clear", {
          method: "POST",
          body: formData,
        });
        if (!response.ok) {
          alert("Failed to clear history.");
          return;
        }
        refreshPlantList();
        if (typed === plantId) {
          document.getElementById("vnirPlant").value = "";
        }
        alert(`Cleared history for ${plantId}`);
      });

      refreshPlantList();

    </script>
  </body>
</html>
